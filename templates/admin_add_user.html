{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Add New User</h1>
{% if error %}<p class="text-red-500 mb-4">{{ error }}</p>{% endif %}
<form method="post" class="max-w-lg space-y-4">
    <input type="email" name="email" placeholder="Email" required
           class="border rounded px-3 py-2 w-full dark:bg-gray-700 dark:border-gray-600 dark:text-white">
    <input type="password" name="password" placeholder="Password" required
           class="border rounded px-3 py-2 w-full dark:bg-gray-700 dark:border-gray-600 dark:text-white">
    <input type="text" name="username" placeholder="Username (e.g. vhng_001)" required
           class="border rounded px-3 py-2 w-full dark:bg-gray-700 dark:border-gray-600 dark:text-white">
    <input type="text" name="display_name" placeholder="Display Name" required
           class="border rounded px-3 py-2 w-full dark:bg-gray-700 dark:border-gray-600 dark:text-white">
    <select name="role" class="border rounded px-3 py-2 w-full dark:bg-gray-700 dark:border-gray-600 dark:text-white">
        <option value="member">Member</option>
        <option value="lead">Lead</option>
        <option value="admin">Admin</option>
    </select>
    <button type="submit" class="px-4 py-2 bg-sky-600 text-white rounded hover:bg-sky-700">Create User</button>
</form>
{% endblock %}
