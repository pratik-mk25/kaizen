{% extends "base.html" %}
{% block title %}Edit Transaction - KAIZEN{% endblock %}
{% block header_title %}Edit Transaction{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-4">
        <a href="/budget" class="text-sm text-primary hover:underline flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Budget
        </a>
    </div>
    <div class="bg-surface border border-outline-variant rounded-lg p-6">
        <form method="POST" action="/budget/transactions/{{ txn.id }}/edit" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider block mb-1">Description</label>
                    <input type="text" name="description" value="{{ txn.description }}" required class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 text-sm focus:border-primary focus:ring-0">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider block mb-1">Amount</label>
                    <input type="number" name="amount" step="0.01" value="{{ txn.amount }}" required class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 text-sm focus:border-primary focus:ring-0">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider block mb-1">Type</label>
                    <select name="type_" class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 text-sm focus:border-primary focus:ring-0">
                        <option value="income" {% if txn.type == 'income' %}selected{% endif %}>Income</option>
                        <option value="expense" {% if txn.type == 'expense' %}selected{% endif %}>Expense</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider block mb-1">Date</label>
                    <input type="date" name="transaction_date" value="{{ txn.transaction_date }}" required class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 text-sm focus:border-primary focus:ring-0">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider block mb-1">Category</label>
                    <select name="category_id" class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 text-sm focus:border-primary focus:ring-0">
                        <option value="">None</option>
                        {% for c in categories %}
                        <option value="{{ c.id }}" {% if category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider block mb-1">Notes</label>
                <textarea name="notes" rows="3" class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 text-sm focus:border-primary focus:ring-0">{{ txn.notes or '' }}</textarea>
            </div>
            <div class="flex justify-end gap-3 pt-2">
                <a href="/budget" class="px-4 py-2 text-sm border border-outline-variant rounded-lg hover:bg-surface-variant/50">Cancel</a>
                <button type="submit" class="bg-primary text-on-primary px-6 py-2 text-sm font-bold uppercase tracking-wider rounded-lg">Update</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
