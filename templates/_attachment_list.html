{% if attachments %}
<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
    {% for att in attachments %}
        <div class="border rounded p-2 bg-gray-50 dark:bg-gray-700">
            {% if att.mime_type and att.mime_type.startswith('image/') %}
                <img src="{{ att.signed_url }}" alt="{{ att.file_name }}" class="w-full h-24 object-cover rounded mb-1">
            {% else %}
                <div class="h-24 flex items-center justify-center bg-gray-200 dark:bg-gray-600 rounded mb-1">
                    <span class="text-2xl">📎</span>
                </div>
            {% endif %}
            <a href="{{ att.signed_url }}" target="_blank" class="text-xs text-blue-600 dark:text-blue-400 truncate block">{{ att.file_name }}</a>
            {% if user.role in ('lead', 'admin') %}
            <form hx-post="/tasks/{{ task.id }}/attachments/{{ att.id }}/delete" 
                  hx-target="#attachment-list" 
                  hx-swap="innerHTML" 
                  class="mt-1">
                <button type="submit" class="text-xs text-red-600 hover:underline">Delete</button>
            </form>
            {% endif %}
        </div>
    {% endfor %}
</div>
{% else %}
<p class="text-gray-500">No files attached.</p>
{% endif %}
